<!DOCTYPE html>
<html lang="id">
<head>
  <base target="_top">
  <link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#F2C94C">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>GAS Dokumenter</title>
  
  <style>
    * { box-sizing: border-box; }
    body, html { margin: 0; padding: 0; height: 100%; width: 100%; overflow: hidden; background-color: #F2C94C; }
    
    #splash-screen {
      position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
      /* BACKGROUND TETAP SESUAI SETTINGANMU */
      background-image: url('https://drive.google.com/thumbnail?id=1Ib42zmpyOBi0o35hBHGf0lkJ7KhH1X4b&sz=w1500');
      background-repeat: no-repeat;
      background-position: center center;
      background-size: 100% 100% !important;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      z-index: 9999;
    }

    .brand-wrapper { display: flex; align-items: center; gap: 12px; z-index: 10; margin-top: -30px; }
    .logo-container { position: relative; width: 64px; height: 64px; display: flex; align-items: center; justify-content: center; }
    #hati-logo { width: 54px; z-index: 2; }
    
    .svg-loader { position: absolute; width: 64px; height: 64px; transform: rotate(-90deg); z-index: 3; }
    .circle-draw { 
      fill: none; stroke: #FFFFFF; stroke-width: 3.2; stroke-linecap: round; 
      stroke-dasharray: 195; stroke-dashoffset: 195; 
      animation: draw 1.6s cubic-bezier(0.65, 0, 0.35, 1) forwards; 
      animation-delay: 0.3s; 
    }
    @keyframes draw { to { stroke-dashoffset: 0; } }

    #ruby-text { height: 54px; object-fit: contain; }

    .footer-text { 
      position: absolute; bottom: 65px; width: 85%; text-align: center; 
      color: white; font-size: 8px; line-height: 1.5; opacity: 0.9; 
      font-family: sans-serif; letter-spacing: 0.2px; 
    }

    #app-frame { position: fixed; top: 0; left: 0; border: none; width: 100%; height: 100%; opacity: 0; z-index: 1; }
    .visible { opacity: 1 !important; transition: opacity 0.5s ease; }
    .hidden { opacity: 0; visibility: hidden; transition: opacity 0.5s ease; }
  </style>
</head>
<body>

  <div id="splash-screen">
    <div class="brand-wrapper">
      <div class="logo-container">
        <svg class="svg-loader" viewBox="0 0 64 64">
          <circle class="circle-draw" cx="32" cy="32" r="31" />
        </svg>
        <img id="hati-logo" src="https://drive.google.com/thumbnail?id=1p3ucC2P6VUqle4izxSQUw8sZMAwsk_9J&sz=w500">
      </div>
      <img id="ruby-text" src="https://drive.google.com/thumbnail?id=1Qv9WabWHfZJZ8KH2-1qnseAA_4RERvB6&sz=w500">
    </div>
    
    <div class="footer-text">
      Dibuat untuk mempermudah dan mempersingkat segalanya<br>
      agar bisa mencari dan menemukan tujuan hidup yang berarti
    </div>
  </div>

  <iframe id="app-frame" src="https://script.google.com/macros/s/AKfycbzfTVMbUjQYbV0ADCXBbXKjD8UXZKC64s5dvt93dUMIE2K5FmzIkd2xJ_Ime7iilEXMDw/exec" onload="finishSplash()"></iframe>

  <script>
  const urlParams = new URLSearchParams(window.location.search);
  const cleanUrl = window.location.origin + window.location.pathname;

  // JIKA DETEKSI MAU LOGOUT
  if (urlParams.get('logout') === 'true') {
    // Ubah tampilan splash screen jadi pesan konfirmasi logout agar tidak Error 400
    document.getElementById('splash-screen').innerHTML = `
      <div style="text-align:center; color:white; font-family:sans-serif; padding:20px;">
        <img src="https://drive.google.com/thumbnail?id=1p3ucC2P6VUqle4izxSQUw8sZMAwsk_9J&sz=w500" style="width:80px; margin-bottom:20px;">
        <h2 style="margin-bottom:10px;">Ganti Akun Google?</h2>
        <p style="font-size:14px; opacity:0.9; margin-bottom:30px;">Klik tombol di bawah untuk keluar dan pilih akun baru.</p>
        <a href="https://accounts.google.com/Logout?continue=${encodeURIComponent(cleanUrl)}" 
           style="background:white; color:#F2C94C; padding:15px 35px; border-radius:30px; text-decoration:none; font-weight:bold; display:inline-block; box-shadow:0 4px 15px rgba(0,0,0,0.2);">
           KELUAR SEKARANG
        </a>
        <br><br>
        <a href="${cleanUrl}" style="color:white; font-size:12px; opacity:0.7; text-decoration:none;">Batal</a>
      </div>
    `;
    // Stop loading iframe kalau lagi mode logout
    document.getElementById('app-frame').remove();
  }

  function finishSplash() {
    if (!urlParams.has('logout')) {
      setTimeout(() => {
        document.getElementById('app-frame').classList.add('visible');
        setTimeout(() => {
          document.getElementById('splash-screen').classList.add('hidden');
        }, 150);
      }, 2300);
    }
  }
      
      setTimeout(() => {
        document.getElementById('splash-screen').classList.add('hidden');
      }, 150);
    }, 2500); 
  }
    if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('sw.js');
  }
  </script>
</body>
</html>
